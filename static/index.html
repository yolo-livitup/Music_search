<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b0b10">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Music Search">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <title>Music Search - 音乐学术查询</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <header>
            <div class="logo-icon">&#9835;</div>
            <h1>Music Search</h1>
            <p class="subtitle">音乐学档案查询系统 — 输入歌名 / 专辑 / 音乐人</p>
        </header>

        <div class="search-box">
            <input
                type="text"
                id="queryInput"
                placeholder=""
                autocomplete="off"
            />
            <button id="searchBtn">查询</button>
        </div>
        <div class="mode-hints">
            <span class="mode-tag song">&#9835; 歌词解析</span>
            <span class="mode-tag album">&#128191; 专辑档案</span>
            <span class="mode-tag artist">&#127925; 人物志</span>
        </div>
        <p class="hint">输入歌名、专辑名或音乐人名字即可查询。只输歌名自动匹配最热门版本，加歌手名（如"90210 Wale"）可精确查找指定版本 · Esc 清空搜索框</p>

        <div id="history" class="history hidden">
            <div class="history-header">
                <span class="history-label">最近搜索</span>
                <button id="clearHistoryBtn" class="btn-link">清空</button>
            </div>
            <div id="historyList" class="history-list"></div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="eq-bars">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <span>正在检索音乐档案库...</span>
        </div>

        <div id="result" class="result hidden">
            <div class="result-header">
                <div class="result-header-left">
                    <h2>查询结果</h2>
                    <span id="modeBadge" class="mode-badge hidden"></span>
                </div>
                <button id="copyBtn" class="btn-sm">复制</button>
            </div>
            <div id="resultContent" class="result-content">
                <div id="resultSingle" class="result-single"></div>
                <div id="resultDual" class="result-dual hidden">
                    <div class="dual-tabs">
                        <button class="dual-tab active" data-panel="lyrics">歌词</button>
                        <button class="dual-tab" data-panel="analysis">解析</button>
                    </div>
                    <div class="dual-panels">
                        <div id="lyricsPanel" class="dual-panel lyrics-panel"></div>
                        <div id="analysisPanel" class="dual-panel analysis-panel"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="error" class="error hidden"></div>

        <div id="recommendations" class="recommendations hidden">
            <h3 class="rec-title">你可能会喜欢</h3>
            <div id="recList" class="rec-list"></div>
        </div>

        <div id="shareBar" class="share-bar hidden">
            <span class="share-label">分享此结果：</span>
            <input id="shareUrl" class="share-url" type="text" readonly />
            <button id="shareCopyBtn" class="btn-sm">复制链接</button>
            <button id="shareGenBtn" class="btn-sm btn-share">生成分享链接</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
